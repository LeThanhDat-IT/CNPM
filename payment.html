<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thanh Toán</title>
  <style>
    /* Reset CSS */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Roboto', Arial, sans-serif;
      background-color: #f9f9f9;
      padding: 20px;
    }

    .container {
      max-width: 800px;
      margin: 0 auto;
      background-color: #ffffff;
      border-radius: 10px;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
      padding: 20px;
    }

    h1 {
      font-size: 24px;
      color: #1e3a8a;
      margin-bottom: 20px;
      text-align: center;
    }

    .payment-option {
      border: 1px solid #ddd;
      padding: 15px;
      margin-bottom: 15px;
      border-radius: 8px;
      cursor: pointer;
      transition: border-color 0.3s ease;
    }

    .payment-option:hover {
      border-color: #1e3a8a;
    }

    .payment-option input {
      margin-right: 10px;
    }

    .payment-option label {
      font-size: 16px;
      color: #333;
      display: flex;
      align-items: center;
    }

    .payment-details {
      margin-left: 30px;
      font-size: 14px;
      color: #555;
      margin-top: 10px;
    }

    .coupon-section {
      margin-top: 20px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .coupon-section input {
      flex: 1;
      padding: 10px;
      border: 1px solid #ddd;
      border-radius: 5px;
    }

    .coupon-section button {
      background-color: #1e3a8a;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 5px;
      cursor: pointer;
      font-size: 14px;
    }

    .coupon-section button:hover {
      background-color: #153e75;
    }

    .total-section {
      margin-top: 20px;
      font-size: 18px;
      font-weight: bold;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .total-section .total-price {
      color: #e53e3e;
    }

    .confirm-button {
      background-color: #ff6600;
      color: white;
      border: none;
      padding: 15px 20px;
      border-radius: 5px;
      cursor: pointer;
      font-size: 16px;
      font-weight: bold;
      text-align: center;
      margin-top: 20px;
      width: 100%;
    }

    .confirm-button:hover {
      background-color: #e55a00;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Bạn muốn thanh toán thế nào?</h1>

    <div class="payment-option">
      <label>
        <input type="radio" name="payment" value="vietqr">
        VietQR
      </label>
      <div class="payment-details">
        Đảm bảo bạn có ví điện tử hoặc ứng dụng ngân hàng hỗ trợ thanh toán bằng VietQR.
      </div>
    </div>

    <div class="payment-option">
      <label>
        <input type="radio" name="payment" value="bank-transfer">
        Chuyển tiền qua ngân hàng
      </label>
    </div>

    <div class="payment-option">
      <label>
        <input type="radio" name="payment" value="atm">
        ATM Cards/Mobile Banking
      </label>
    </div>

    <div class="payment-option">
      <label>
        <input type="radio" name="payment" value="credit-card">
        Thẻ thanh toán
      </label>
    </div>

    <div class="payment-option">
      <label>
        <input type="radio" name="payment" value="e-wallet">
        E-Wallet
      </label>
    </div>

    <div class="payment-option">
      <label>
        <input type="radio" name="payment" value="installment">
        Tại Khách Sạn
      </label>
    </div>

    <div class="coupon-section">
      <input type="text" id="coupon-code" placeholder="Nhập mã giảm giá">
      <button onclick="applyCoupon()">Thêm mã</button>
    </div>

    <div class="total-section">
      <span>Tổng giá tiền:</span>
      <span class="total-price" id="total-price">639.185 VND</span>
    </div>

    <button class="confirm-button" onclick="confirmPayment()">Thanh toán & Hiển thị mã QR</button>
  </div>

  <script>
    function applyCoupon() {
      const couponCode = document.getElementById("coupon-code").value;
      if (couponCode === "DISCOUNT50") {
        document.getElementById("total-price").textContent = "589.185 VND";
        alert("Áp dụng mã giảm giá thành công!");
      } else {
        alert("Mã giảm giá không hợp lệ!");
      }
    }

    function confirmPayment() {
      const selected = document.querySelector('input[name="payment"]:checked');
      if (!selected) {
        alert("Vui lòng chọn một phương thức thanh toán để tiếp tục.");
        return;
      }

      const paymentMethod = selected.value;
      alert(`Bạn đã chọn phương thức thanh toán: ${paymentMethod}.\nCảm ơn bạn đã hoàn tất thanh toán!`);
    }
  </script>
</body>
</html>
