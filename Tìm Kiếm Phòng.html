<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Tìm kiếm phòng khách sạn</title>
  <style>
    * {
      box-sizing: border-box;
    }
    body {
      font-family: 'Segoe UI', sans-serif;
      margin: 0;
      padding: 0;
      background-color: #f0f2f5;
    }
    header {
      background-color: #1a2d6c;
      color: white;
      padding: 15px 30px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    header h1 {
      margin: 0;
      font-size: 26px;
    }
    .user-info {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .container {
      display: flex;
      max-width: 1300px;
      margin: 30px auto;
      padding: 0 20px;
      gap: 20px;
    }
    .filter {
      width: 280px;
      background: white;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    .filter h3 {
      margin-bottom: 15px;
      font-size: 18px;
    }
    .filter label {
      display: block;
      margin: 10px 0 5px;
      font-weight: 500;
    }
    .filter input,
    .filter select {
      width: 100%;
      padding: 8px;
      border: 1px solid #ccc;
      border-radius: 6px;
    }
    .filter input[type="radio"] {
      width: auto;
      margin-right: 6px;
    }
    .filter button {
      margin-top: 20px;
      width: 100%;
      padding: 10px;
      background-color: #1a2d6c;
      color: white;
      border: none;
      border-radius: 6px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
    }
    .filter button:hover {
      background-color: #142155;
    }
    .results {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }
    .room-card {
      display: flex;
      background: white;
      padding: 16px;
      border-radius: 12px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.08);
      transition: 0.3s;
    }
    .room-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 6px 14px rgba(0,0,0,0.1);
    }
    .room-card img {
      width: 180px;
      height: 120px;
      border-radius: 8px;
      object-fit: cover;
      margin-right: 20px;
    }
    .room-info {
      flex: 1;
    }
    .room-info h4 {
      margin: 0 0 8px;
      font-size: 20px;
    }
    .room-info .details {
      color: #555;
      margin-bottom: 10px;
      font-size: 14px;
    }
    .room-info .price {
      font-size: 20px;
      font-weight: bold;
      color: #d10000;
      margin-bottom: 10px;
    }
    .room-info button {
      background-color: #1a2d6c;
      color: white;
      padding: 8px 16px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 500;
      transition: 0.3s;
    }
    .room-info button:hover {
      background-color: #142155;
    }
  </style>
</head>
<body>

  <header>
    <h1>THE COW</h1>
    <div class="user-info">
      <span>Thuê phòng khách sạn</span>
      <span>👤</span>
    </div>
  </header>

  <div class="container">
    <div class="filter">
      <h3>Tìm kiếm phòng</h3>
      <label for="searchName">Tên phòng</label>
      <input type="text" id="searchName" placeholder="Nhập tên phòng...">

      <label for="guests">Số người</label>
      <select id="guests">
        <option value="">Tất cả</option>
        <option value="1">1 người</option>
        <option value="2">2 người</option>
        <option value="3">3 người</option>
        <option value="4">4 người</option>
      </select>

      <h3 style="margin-top: 20px;">Sắp xếp kết quả</h3>
      <label><input type="radio" name="sort" value="desc" checked> Giá cao nhất</label>
      <label><input type="radio" name="sort" value="asc"> Giá thấp nhất</label>
      <label><input type="radio" name="sort" value="popular"> Thuê nhiều nhất</label>

      <h3 style="margin-top: 20px;">Lọc theo giá</h3>
      <label for="minPrice">Tối thiểu</label>
      <input type="number" id="minPrice" value="0">

      <label for="maxPrice">Tối đa</label>
      <input type="number" id="maxPrice" value="100000000">

      <button onclick="applyFilter()">Áp dụng</button>
    </div>

    <div class="results" id="room-list">
      <!-- Danh sách phòng -->
    </div>
  </div>
<!-- Phần script phía dưới cùng của file HTML -->
<script>
  const rooms = [
    { name: 'Phòng Gia Đình', price: 360000, guests: 2, img: 'images/family-suite-la-gi.webp', popularity: 5 },
    { name: 'Phòng Đôi Cao Cấp', price: 1200000, guests: 2, img: 'images/phong_caocap.webp', popularity: 8 },
    { name: 'Phòng Mini', price: 200000, guests: 2, img: 'images/phong_don.webp', popularity: 3 },
    { name: 'Phòng Tình Nhân', price: 560000, guests: 2, img: 'images/momo-upload-api-220102154452-637767350924938334.jpg', popularity: 6 },
  ];

  function renderRooms(list) {
    const container = document.getElementById('room-list');
    container.innerHTML = '';
    if (list.length === 0) {
      container.innerHTML = '<p style="color: #d10000;">Không tìm thấy phòng phù hợp.</p>';
      return;
    }
    list.forEach(room => {
      const card = document.createElement('div');
      card.className = 'room-card';
      card.innerHTML = `
        <img src="${room.img}" alt="${room.name}">
        <div class="room-info">
          <h4>${room.name}</h4>
          <div class="details">👥 ${room.guests} người</div>
          <div class="price">${room.price.toLocaleString()} đ</div>
          <button onclick='bookRoom(${JSON.stringify(room)})'>Đặt phòng</button>
        </div>
      `;
      container.appendChild(card);
    });
  }

  function bookRoom(room) {
    const confirmBooking = confirm(`Xác nhận đặt phòng "${room.name}" với giá ${room.price.toLocaleString()} đ?`);
    if (confirmBooking) {
      let bookings = JSON.parse(localStorage.getItem('bookings')) || [];
      bookings.push(room);
      localStorage.setItem('bookings', JSON.stringify(bookings));
      alert('✅ Đặt phòng thành công!');
      
    }
  }

  function applyFilter() {
    const nameKeyword = document.getElementById('searchName').value.toLowerCase();
    const guests = document.getElementById('guests').value;
    const minPrice = parseInt(document.getElementById('minPrice').value);
    const maxPrice = parseInt(document.getElementById('maxPrice').value);
    const sort = document.querySelector('input[name="sort"]:checked').value;

    let filtered = rooms.filter(room => {
      const matchesName = room.name.toLowerCase().includes(nameKeyword);
      const matchesGuests = guests ? room.guests === parseInt(guests) : true;
      const matchesPrice = room.price >= minPrice && room.price <= maxPrice;
      return matchesName && matchesGuests && matchesPrice;
    });

    if (sort === 'asc') {
      filtered.sort((a, b) => a.price - b.price);
    } else if (sort === 'desc') {
      filtered.sort((a, b) => b.price - a.price);
    } else if (sort === 'popular') {
      filtered.sort((a, b) => b.popularity - a.popularity);
    }

    renderRooms(filtered);
  }

  // Hiển thị mặc định
  renderRooms(rooms);
</script>
</body>
</html>
