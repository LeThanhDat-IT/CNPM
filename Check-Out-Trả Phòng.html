<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yêu cầu trả phòng</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 1000px;
            margin: 20px auto;
            padding: 20px;
            background-color: #f4f4f4;
        }
        h1 {
            text-align: center;
            color: #333;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin: 20px 0;
            background-color: #fff;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        th, td {
            padding: 12px;
            text-align: center;
            border: 1px solid #ddd;
        }
        th {
            background-color: #223B79;
            color: white;
            font-weight: bold;
        }
        tr:nth-child(even) {
            background-color: #f9f9f9;
        }
        tr:hover {
            background-color: #f1f1f1;
        }
        button {
            padding: 8px 16px;
            background-color: #223B79;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        button:hover {
            background-color: #223B79;
        }
        .address {
            text-align: center;
            font-style: italic;
            color: #555;
            margin-top: 20px;
        }
        @media screen and (max-width: 600px) {
            table {
                font-size: 14px;
            }
            th, td {
                padding: 8px;
            }
        }
    </style>
</head>
<body>
    <h1>Yêu cầu trả phòng</h1>
    <table>
        <thead>
            <tr>
                <th>Mã KH</th>
                <th>Tên</th>
                <th>Số phòng</th>
                <th>Ngày nhận</th>
                <th>Ngày trả</th>
                <th>Hành động</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>A001</td>
                <td>Lê Thành Đạt</td>
                <td>A01</td>
                <td>26-04-2025</td>
                <td>27-04-2025</td>
                <td><button>Trả phòng</button></td>
            </tr>
            <tr>
                <td>A002</td>
                <td>Phạm Ngọc Sơn</td>
                <td>A02</td>
                <td>25-04-2025</td>
                <td>26-04-2025</td>
                <td><button>Trả phòng</button></td>
            </tr>
            <tr>
                <td>A003</td>
                <td>Nguyễn Trung Hiếu</td>
                <td>A03</td>
                <td>24-04-2025</td>
                <td>25-04-2025</td>
                <td><button>Trả phòng</button></td>
            </tr>
        </tbody>
    </table>
    <div class="address">Địa chỉ: [Thêm địa chỉ khách sạn tại đây]</div>
</body>
</html>
