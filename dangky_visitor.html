<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Ký</title>
    <style>
        body {
            font-family: system-ui;
            background-color: #D8F7F2;
        }
        .container {
            max-width: 500px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            padding: 20px;
        }
        .title {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 10px;
            text-align: center;
        }
        .subtitle {
            font-size: 14px;
            color: #8692A6;
            margin-bottom: 20px;
            text-align: center;
        }
        label {
            font-weight: bold;
            color: #312E49;
            margin: 8px 0 4px;
        }
        input, select {
            width: 100%;
            height: 36px;
            padding: 8px;
            margin-bottom: 12px;
            border: 1px solid #A2A2A6;
            border-radius: 4px;
            font-size: 13px;
        }
        .gender {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 12px;
        }

        .gender-label {
            min-width: 80px;
            font-weight: bold;
            color: #312E49;
            font-size: 15px;
        }

        .gender label {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 15px;
            cursor: pointer;
        }

        .gender input[type="radio"] {
            width: 18px;
            height: 18px;
        }

        .checkbox {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 14px;
            margin-bottom: 25px;
            line-height: 1.4;
        }

        .checkbox input[type="checkbox"] {
            width: 18px;
            height: 18px;
            margin: 0;
        }


        button {
            width: 100%;
            padding: 10px;
            background-color: #223B79;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="container">
        <div style="text-align: center; margin-bottom: 20px;">
			<span style="color: #02034E; font-size: 48px; font-weight: bold;">THE COW</span>
		</div>
        <div class="title">Đăng ký tài khoản người dùng</div>
        <div class="subtitle">Điền vào các thông tin dưới đây để đăng ký tài khoản.</div>

        <label for="name">Họ và Tên</label>
        <input type="text" id="name" placeholder="Nhập họ và tên">

        <label for="phone">Số Điện Thoại</label>
        <input type="tel" id="phone" placeholder="Nhập số điện thoại">

        <label for="email">Email</label>
        <input type="email" id="email" placeholder="Nhập email">

        <div class="gender">
            <span class="gender-label">Giới tính:</span>
            <label><input type="radio" name="gender" value="Nam"> Nam</label>
            <label><input type="radio" name="gender" value="Nữ"> Nữ</label>
        </div>

        <label for="dob">Ngày sinh</label>
        <input type="date" id="dob">

        <label for="address">Địa chỉ</label>
        <input type="text" id="address" placeholder="Nhập địa chỉ">

        <label for="username">Tên đăng nhập</label>
        <input type="text" id="username" placeholder="Nhập tên đăng nhập">

        <label for="password">Mật khẩu</label>
        <input type="password" id="password" placeholder="Nhập mật khẩu">

        <label for="confirm-password">Nhập lại mật khẩu</label>
        <input type="password" id="confirm-password" placeholder="Nhập lại mật khẩu">

        <div class="checkbox">
            <input type="checkbox" id="agree">
            <label for="agree">Tôi đồng ý với Điều khoản sử dụng và Chính sách bảo mật.</label>
        </div>

        <button onclick="handleRegister()">Tạo tài khoản</button>
    </div>

    <script>
        function handleRegister() {
            const name = document.getElementById('name').value;
            const phone = document.getElementById('phone').value;
            const email = document.getElementById('email').value;
            const gender = document.querySelector('input[name="gender"]:checked')?.value || '';
            const dob = document.getElementById('dob').value;
            const address = document.getElementById('address').value;
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirm-password').value;
            const agree = document.getElementById('agree').checked;

            if (!name || !phone || !email || !gender || !dob || !address || !username || !password || !confirmPassword) {
                alert("Vui lòng điền đầy đủ tất cả các trường!");
                return;
            }
            if (password !== confirmPassword) {
                alert("Mật khẩu và xác nhận mật khẩu không khớp!");
                return;
            }
            if (!agree) {
                alert("Vui lòng đồng ý với Điều khoản sử dụng và Chính sách bảo mật!");
                return;
            }

            let accounts = JSON.parse(localStorage.getItem('accounts')) || [];
            if (accounts.some(account => account.username === username)) {
                alert("Tên đăng nhập đã tồn tại!");
                return;
            }
            // Kiểm tra định dạng email
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailRegex.test(email)) {
                alert("Email không đúng định dạng!");
                return;
            }

            // Kiểm tra số điện thoại: đủ 10 số và bắt đầu bằng 0
            const phoneRegex = /^0\d{9}$/;
            if (!phoneRegex.test(phone)) {
                alert("Số điện thoại phải bắt đầu bằng số 0 và đủ 10 chữ số!");
                return;
            }


            const newAccount = {
                username,
                name,
                phone,
                email,
                gender,
                dob,
                address,
                password,
                language: 'vi',
                notifications: true
            };

            accounts.push(newAccount);
            localStorage.setItem('accounts', JSON.stringify(accounts));

            alert("Tài khoản đã được đăng ký thành công!");
            setTimeout(() => {
                window.location.href = "dangnhap.html";
            }, 1500);
        }
    </script>
</body>
</html>
