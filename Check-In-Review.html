<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Check-In-Review</title>
	<style>
		body {
			font-family: system-ui;
		}
	</style>
</head>
<body>
		<div style="display: flex; flex-direction: column; background: #FFFFFF;">
		<div style="height: 743px; align-self: stretch; background: #FFFFFF;">
			<div style="align-self: stretch; display: flex; flex-direction: column; align-items: flex-start; margin: 50px 365px 64px 365px;">
				<span style="color: #000000; font-size: 48px; font-weight: bold; margin-bottom: 8px;" >
					Welcome to The Cow Hotel !
				</span>
				<span style="color: #000000; font-size: 24px;" >
					Xem lại và hoàn tất thủ tục check-in
				</span>
			</div>
			<div style="align-self: stretch; display: flex; flex-direction: column; align-items: flex-start; background: #FFFFFF; border: 1px solid #000000; padding-top: 14px; padding-bottom: 14px; margin-bottom: 40px; margin-left: 340px; margin-right: 340px;">
				<div style="display: flex; align-items: flex-start; margin-bottom: 13px; margin-left: 10px;">
					<span style="color: #000000; font-size: 24px; margin-right: 283px;" >
						Số phòng
					</span>
					<span style="color: #000000; font-size: 24px;" >
						Ngày lưu trú
					</span>
				</div>
				<div style="display: flex; align-items: flex-start; margin-bottom: 34px; margin-left: 10px;">
					<div style="width: 260px; box-sizing: border-box; height: 35px; box-sizing: border-box; background: #FFFFFF; border: 1px solid #000000; margin-right: 112px;">
					</div>
					<div style="width: 300px; box-sizing: border-box; height: 35px; box-sizing: border-box; background: #FFFFFF; border: 1px solid #000000;">
					</div>
				</div>
				<span style="color: #000000; font-size: 24px; margin-bottom: 8px; margin-left: 10px;" >
					Số lượng khách
				</span>
				<div style="width: 435px; box-sizing: border-box; height: 39px; box-sizing: border-box; background: #FFFFFF; border: 1px solid #000000; margin-bottom: 15px; margin-left: 10px;">
				</div>
				<div style="display: flex; align-items: center; margin-left: 14px;">
					<div style="width: 16px; box-sizing: border-box; height: 16px; box-sizing: border-box; background: #FFFFFF; border-radius: 4px; border: 2px solid #667085; margin-right: 10px;">
					</div>
					<span style="color: #000000; font-size: 18px;" >
						Tôi đồng ý với chính sách của khách sạn
					</span>
				</div>
			</div>
			<div style="align-self: stretch; display: flex; flex-direction: column; align-items: center; background: #223B79; border-radius: 10px; padding-top: 13px; margin-bottom: 187px; margin-left: 479px; margin-right: 479px;">
				<span style="color: #FFFFFF; font-size: 24px; font-weight: bold;" >
					Tiếp tục
				</span>
			</div>
		</div>
	</div>
</body>
</html>
