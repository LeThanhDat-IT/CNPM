<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Xem lại thông tin Check-In</title>
  <style>
    body {
      font-family: system-ui;
      background: #f9f9f9;
      padding: 40px;
    }

    .container {
      max-width: 700px;
      margin: auto;
      background: white;
      padding: 30px;
      border-radius: 8px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    h1 {
      font-size: 32px;
      margin-bottom: 20px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      font-size: 18px;
      display: block;
      margin-bottom: 5px;
      font-weight: bold;
    }

    input, select {
      width: 100%;
      padding: 10px;
      font-size: 16px;
      border: 1px solid #ccc;
      border-radius: 5px;
    }

    .checkbox {
        display: flex;
        align-items: center;
        gap: 10px;
        font-size: 14px;
        margin-bottom: 25px;
        line-height: 1.4;
    }

    .checkbox input[type="checkbox"] {
         width: 18px;
         height: 18px;
        margin: 0;
    }

	
    button {
      width: 100%;
      padding: 12px;
      background-color: #223B79;
      color: white;
      font-size: 18px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }

    button:hover {
      background-color: #1a2f5c;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Xem lại và hoàn tất Check-In</h1>

    <div class="form-group">
      <label for="roomNumber">Số phòng</label>
      <input type="text" id="roomNumber" placeholder="Ví dụ: 203">
    </div>

    <div class="form-group">
      <label for="stayDate">Ngày lưu trú</label>
      <input type="date" id="stayDate">
    </div>

    <div class="form-group">
      <label for="guestCount">Số lượng khách</label>
      <input type="number" id="guestCount" min="1" max="10" placeholder="Nhập số khách">
    </div>

    <div class="checkbox">
        <input type="checkbox" id="agree">
        <label for="agree">Tôi đồng ý với Điều khoản sử dụng và Chính sách của khách sạn.</label>
    </div>


    <button onclick="handleReview()">Tiếp tục</button>
  </div>

  <script>
    function handleReview() {
      const room = document.getElementById('roomNumber').value.trim();
      const date = document.getElementById('stayDate').value;
      const guests = document.getElementById('guestCount').value;
      const agreed = document.getElementById('agree').checked;

      if (!room || !date || !guests) {
        alert("Vui lòng điền đầy đủ thông tin.");
        return;
      }

      if (!agreed) {
        alert("Bạn phải đồng ý với chính sách của khách sạn.");
        return;
      }

      // Giả sử lưu lại để gửi về server hoặc chuyển sang bước tiếp theo
      const reviewData = {
        room, date, guests
      };
      console.log("Dữ liệu xác nhận:", reviewData);
      alert("Thông tin đã được xác nhận. Chuyển sang trang thanh toán.");
      window.location.href = "Check-In-Payment.html";	  
    }
  </script>
</body>
</html>
