<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý Phòng</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: #f1f5f9;
        }

        .container {
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: #1a2d6c;
            color: white;
            padding: 20px;
        }

        header h1 {
            font-size: 28px;
        }

        .user-info {
            display: flex;
            align-items: center;
        }

        .user-icon {
            margin-left: 10px;
            font-size: 24px;
        }

        .menu {
            margin-top: 20px;
            background-color: #fff;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }

        .menu ul {
            list-style-type: none;
            padding: 10px;
        }

        .menu li {
            padding: 10px;
            cursor: pointer;
            color: #333;
        }

        .menu li.active {
            background-color: #1a2d6c;
            color: white;
        }

        .main-content {
            margin-top: 20px;
            background-color: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
        }

        input[type="text"], input[type="date"] {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 16px;
        }

        .form-actions {
            display: flex;
            gap: 10px;
        }

        button {
            padding: 10px 20px;
            border: none;
            background-color: #1a2d6c;
            color: white;
            cursor: pointer;
            border-radius: 5px;
            font-size: 16px;
        }

        button:hover {
            background-color: #314a9c;
        }

        table {
            width: 100%;
            margin-top: 30px;
            border-collapse: collapse;
        }

        table th, table td {
            padding: 12px;
            border: 1px solid #ddd;
            text-align: center;
        }

        table th {
            background-color: #f1f5f9;
        }
    </style>
</head>
<body>
<div class="container">
    <header>
        <h1>THE COW</h1>
        <div class="user-info">
            <span>Thuê phòng khách sạn</span>
            <span class="user-icon">👤</span>
        </div>
    </header>

    <div class="menu">
        <ul>
            <li class="active">Quản lý phòng</li>
            <li>Quản lý khách hàng</li>
            <li>Quản lý tài khoản</li>
            <li>Lịch sử đặt phòng</li>
            <li>Thống kê thu nhập</li>
        </ul>
    </div>

    <div class="main-content">
        <form id="room-form">
            <div class="form-group">
                <label for="room-name">Tên phòng:</label>
                <input type="text" id="room-name" value="">
            </div>
            <div class="form-group">
                <label for="room-type">Kiểu phòng:</label>
                <input type="text" id="room-type" value="">
            </div>
            <div class="form-group">
                <label for="room-price">Giá phòng:</label>
                <input type="text" id="room-price" value="">
            </div>
            <div class="form-group">
                <label for="room-status">Tình trạng:</label>
                <input type="text" id="room-status" value="">
            </div>
            <div class="form-actions">
                <button type="button" onclick="addRoom()">Thêm</button>
                <button type="button" onclick="updateRoom()">Cập nhật</button>
                <button type="button" onclick="deleteRoom()">Xóa</button>
                <button type="button" onclick="searchRoom()">Tìm kiếm</button>
                <button type="button" onclick="renderRoomList()">Hiển thị tất cả</button>
            </div>
        </form>

        <table id="room-table">
            <thead>
            <tr>
                <th>Mã phòng</th>
                <th>Tên phòng</th>
                <th>Kiểu phòng</th>
                <th>Giá phòng</th>
                <th>Tình trạng</th>
            </tr>
            </thead>
            <tbody>
            <!-- Dữ liệu phòng sẽ được hiển thị ở đây -->
            </tbody>
        </table>
    </div>
</div>
<script>
    let rooms = [
        { code: 'R001', name: 'Phòng Trang Trọng', type: '1', price: '400,000', status: '1' },
        { code: 'R002', name: 'Phòng Tiêu Chuẩn', type: '1', price: '200,000', status: '1' },
        { code: 'R003', name: 'Phòng Cao Cấp', type: '1', price: '1,200,000', status: '1' },
    ];

    function renderRoomList(list = rooms) {
        const tbody = document.querySelector('#room-table tbody');
        tbody.innerHTML = '';
        list.forEach(room => {
            const row = document.createElement('tr');
            row.innerHTML = `
                <td>${room.code}</td>
                <td>${room.name}</td>
                <td>${room.type}</td>
                <td>${room.price}</td>
                <td>${room.status}</td>
            `;
            row.onclick = () => {
                document.getElementById('room-name').value = room.name;
                document.getElementById('room-type').value = room.type;
                document.getElementById('room-price').value = room.price;
                document.getElementById('room-status').value = room.status;
            };
            tbody.appendChild(row);
        });
    }

    function addRoom() {
        const name = document.getElementById('room-name').value;
        const type = document.getElementById('room-type').value;
        const price = document.getElementById('room-price').value;
        const status = document.getElementById('room-status').value;

        const newRoom = {
            code: 'R' + String(rooms.length + 1).padStart(3, '0'),
            name, type, price, status
        };

        rooms.push(newRoom);
        renderRoomList();
    }

    function updateRoom() {
        const name = document.getElementById('room-name').value;
        const room = rooms.find(r => r.name === name);
        if (room) {
            room.type = document.getElementById('room-type').value;
            room.price = document.getElementById('room-price').value;
            room.status = document.getElementById('room-status').value;
            renderRoomList();
        }
    }

    function deleteRoom() {
        const name = document.getElementById('room-name').value;
        rooms = rooms.filter(r => r.name !== name);
        renderRoomList();
    }

    function searchRoom() {
        const name = document.getElementById('room-name').value;
        const result = rooms.filter(r => r.name.includes(name));
        renderRoomList(result);
    }
    window.onload = renderRoomList;
</script>
</body>
</html>
