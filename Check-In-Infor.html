<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Thủ Tục Check-In Khách Sạn</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      background: #f8f9fa;
      margin: 0;
      padding: 0;
    }
    .container {
      max-width: 700px;
      margin: 50px auto;
      background: #ffffff;
      border: 1px solid #ccc;
      border-radius: 10px;
      padding: 30px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
    h1 {
      text-align: center;
      margin-bottom: 30px;
    }
    .form-group {
      margin-bottom: 20px;
    }
    label {
      display: block;
      font-weight: bold;
      margin-bottom: 6px;
    }
    input, select {
      width: 100%;
      padding: 10px;
      border-radius: 5px;
      border: 1px solid #ccc;
      font-size: 16px;
    }
    button {
      width: 100%;
      padding: 12px;
      font-size: 18px;
      background-color: #223B79;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }
    button:hover {
      background-color: #1a2f5d;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Thủ Tục Check-In Khách Sạn</h1>
    <div class="form-group">
      <label for="fullname">Họ và tên</label>
      <input type="text" id="fullname" placeholder="Nhập họ và tên">
    </div>
    <div class="form-group">
      <label for="bookingCode">Mã đặt phòng</label>
      <input type="text" id="bookingCode" placeholder="Nhập mã đặt phòng">
    </div>
    <div class="form-group">
      <label for="phone">Số điện thoại</label>
      <input type="text" id="phone" placeholder="Nhập số điện thoại">
    </div>
    <div class="form-group">
      <label for="idCard">Số CMND/CCCD/Hộ chiếu</label>
      <input type="text" id="idCard" placeholder="Nhập số giấy tờ tùy thân">
    </div>
    <div class="form-group">
      <label for="arrivalTime">Thời gian đến</label>
      <input type="datetime-local" id="arrivalTime">
    </div>
    <div class="form-group">
      <label for="notes">Ghi chú thêm (nếu có)</label>
      <input type="text" id="notes" placeholder="Ví dụ: Yêu cầu giường đơn, không hút thuốc...">
    </div>
    <button onclick="goToReview()">Tiếp tục</button>
  </div>

  <script>
    function goToReview() {
      const data = {
        fullname: document.getElementById('fullname').value.trim(),
        bookingCode: document.getElementById('bookingCode').value.trim(),
        phone: document.getElementById('phone').value.trim(),
        idCard: document.getElementById('idCard').value.trim(),
        arrivalTime: document.getElementById('arrivalTime').value,
        notes: document.getElementById('notes').value.trim()
      };

      // Kiểm tra thông tin bắt buộc
      if (!data.fullname || !data.bookingCode || !data.phone || !data.idCard || !data.arrivalTime) {
        alert("Vui lòng điền đầy đủ thông tin.");
        return;
      }

      // Lưu vào localStorage
      localStorage.setItem("checkinData", JSON.stringify(data));

      // Chuyển đến trang review
      window.location.href = "Check-In-Review.html";
    }
  </script>
</body>
</html>
