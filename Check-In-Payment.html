<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Check-In-Payment</title>
	<style>
		body {
			font-family: system-ui;
		}
	</style>
</head>
<body>
		<div style="display: flex; flex-direction: column; background: #FFFFFF;">
		<div style="height: 742px; box-sizing: border-box; align-self: stretch; display: flex; flex-direction: column; align-items: center; background: #FFFFFF; padding-left: 479px; padding-right: 479px;">
			<span style="color: #000000; font-size: 48px; font-weight: bold; margin-top: 77px; margin-bottom: 21px;" >
				Thanh Toán
			</span>
			<div style="display: flex; flex-direction: column; align-items: flex-start; background: #FFFFFF; border: 1px solid #000000; padding-top: 13px; padding-bottom: 13px; margin-bottom: 21px;">
				<div style="display: flex; align-items: flex-start; margin-bottom: 11px; margin-left: 19px; margin-right: 19px;">
					<div style="width: 16px; box-sizing: border-box; height: 16px; box-sizing: border-box; background: #FFFFFF; border-radius: 4px; border: 2px solid #667085; margin-top: 6px; margin-right: 26px;">
					</div>
					<span style="color: #000000; font-size: 24px; width: 305px;" >
						Thanh toán trước 500.000 VND \nđể hoàn tất check-in
					</span>
				</div>
				<span style="color: #000000; font-size: 24px; margin-left: 61px; width: 153px;" >
					Thanh toán qua:\nThẻ ngân hàng\nChuyển khoản\nTiền mặt
				</span>
			</div>
			<div style="display: flex; align-items: flex-start; background: #FFFFFF; border: 1px solid #000000; padding: 27px 24px 27px 17px; margin-bottom: 39px;">
				<div style="width: 16px; box-sizing: border-box; height: 16px; box-sizing: border-box; background: #FFFFFF; border-radius: 4px; border: 2px solid #667085; margin-top: 4px; margin-right: 18px;">
				</div>
				<span style="color: #000000; font-size: 24px; width: 343px;" >
					Không cần thanh toán trước, bạn đã \nsẵn sàng để nhận phòng
				</span>
			</div>
			<div style="align-self: stretch; display: flex; flex-direction: column; align-items: center; background: #223B79; border-radius: 10px; padding-top: 13px; margin-bottom: 147px;">
				<span style="color: #FFFFFF; font-size: 24px; font-weight: bold;" >
					Hoàn tất Check-In
				</span>
			</div>
		</div>
	</div>
</body>
</html>
